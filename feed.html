<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT Lists</title>
    <link rel="stylesheet" href="feed.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-dot"></div>
          <span>YT Lists</span>
        </div>
        <button class="primary" id="create-list">New list</button>
        <div class="list-search">
          <input
            id="list-search"
            class="list-search-input"
            type="search"
            placeholder="Search lists or channels"
            aria-label="Search lists or channels"
          />
          <button class="list-search-clear" id="list-search-clear" type="button" aria-label="Clear search" hidden>×</button>
        </div>
        <div class="list-section">
          <div class="section-title">Lists</div>
          <div class="list-items" id="list-items"></div>
          <div class="list-search-empty" id="list-search-empty" hidden>No lists match this search.</div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="current-list">
            <div class="list-title" id="current-list-name">All lists</div>
            <div class="list-subtitle" id="current-list-subtitle">0 channels - 0 videos</div>
            <div class="empty-note" id="empty-note" hidden></div>
          </div>
          <div class="actions">
            <span class="timestamp" id="last-updated"></span>
            <button class="ghost" id="toggle-feed-videos" aria-pressed="false">Focus mode: off</button>
            <button class="ghost" id="toggle-shorts">Show Shorts</button>
            <button class="ghost" id="toggle-archived">Show Hidden</button>
            <button class="ghost" id="manage-list" disabled>Manage</button>
            <button class="ghost" id="refresh-feed">Refresh</button>
          </div>
        </header>

        <section class="feed-grid" id="feed-grid"></section>
        <div class="feed-footer" id="feed-footer"></div>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title"></h2>
          <button class="icon-button" id="modal-close" aria-label="Close">x</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-actions" id="modal-actions"></div>
      </div>
    </div>

    <div class="toast hidden" id="archive-toast" role="status" aria-live="polite">
      <span id="archive-toast-text"></span>
      <button class="toast-button" id="archive-undo" type="button">Undo</button>
    </div>

    <input type="file" id="import-file" accept="application/json" hidden />

    <script src="feed.js"></script>
  </body>
</html>
