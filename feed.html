<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT Lists</title>
    <link rel="stylesheet" href="feed.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-dot"></div>
          <span>YT Lists</span>
        </div>
        <button class="primary" id="create-list">+ New list</button>
        <div class="list-search">
          <input
            id="list-search"
            class="list-search-input"
            type="search"
            placeholder="Search lists or channels"
            aria-label="Search lists or channels"
          />
          <button class="list-search-clear" id="list-search-clear" type="button" aria-label="Clear search" hidden>×</button>
        </div>
        <div class="list-section">
          <div class="section-title">Lists</div>
          <div class="list-items" id="list-items"></div>
          <div class="list-search-empty" id="list-search-empty" hidden>No lists match this search.</div>
        </div>
        <div class="sidebar-footer">
          <button class="sidebar-settings" id="sidebar-settings" type="button" aria-label="List tools">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.95l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.06 7.06 0 0 0-1.64-.95l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.23-1.12.54-1.64.95l-2.39-.96a.5.5 0 0 0-.6.22L2.7 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.05.31-.07.63-.07.95s.02.64.07.94L2.82 14.53a.5.5 0 0 0-.12.64l1.92 3.32c.13.23.4.32.64.22l2.39-.96c.5.41 1.06.73 1.64.95l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.58-.22 1.14-.54 1.64-.95l2.39.96c.24.1.51.01.64-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.02-1.59ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"></path>
            </svg>
            <span>Settings</span>
          </button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="current-list">
            <div class="list-title" id="current-list-name">All lists</div>
            <div class="list-meta">
              <div class="list-subtitle" id="current-list-subtitle">0 channels - 0 videos</div>
              <span class="timestamp" id="last-updated"></span>
            </div>
            <div class="empty-note" id="empty-note" hidden></div>
          </div>
          <div class="header-tools">
            <div class="actions">
              <button class="ghost filter-trigger" id="toggle-filters" type="button" aria-expanded="false" aria-controls="filter-panel">Filters</button>
              <button class="ghost" id="manage-list" type="button" disabled>Manage</button>
              <button class="primary refresh-action" id="refresh-feed" type="button">Refresh</button>
            </div>
            <div class="filter-panel hidden" id="filter-panel" role="dialog" aria-label="Feed filters">
              <div class="filter-panel-header">
                <div>
                  <strong>Feed filters</strong>
                  <span>Choose what appears in this view.</span>
                </div>
              </div>
              <div class="filter-panel-list">
                <button class="filter-option" id="toggle-shorts" type="button">Show Shorts</button>
                <button class="filter-option" id="toggle-archived" type="button">Show Hidden</button>
                <button class="filter-option" id="toggle-reader-saved" type="button">Hide Reader Saved</button>
                <button class="filter-option" id="toggle-downie-sent" type="button">Hide Downie Sent</button>
              </div>
              <div class="filter-panel-footer">
                <button class="filter-option focus-option" id="toggle-feed-videos" type="button" aria-pressed="false">Focus mode: off</button>
                <span>Controls the Home and Subscriptions feeds on YouTube.</span>
              </div>
            </div>
          </div>
        </header>

        <section class="feed-grid" id="feed-grid"></section>
        <div class="feed-footer" id="feed-footer"></div>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="modal-backdrop">
      <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-description" tabindex="-1">
        <div class="modal-header">
          <div class="modal-heading">
            <h2 class="modal-title" id="modal-title"></h2>
            <p class="modal-description" id="modal-description" hidden></p>
          </div>
          <button class="icon-button modal-close" id="modal-close" type="button" aria-label="Close">×</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-actions" id="modal-actions"></div>
      </div>
    </div>

    <div class="drawer-backdrop hidden" id="list-drawer-backdrop">
      <aside class="list-drawer" id="list-drawer" role="dialog" aria-modal="true" aria-labelledby="list-drawer-title" tabindex="-1">
        <header class="list-drawer-header">
          <div class="list-drawer-heading">
            <div class="drawer-kicker">Manage list</div>
            <div class="drawer-title-row">
              <h2 class="drawer-title" id="list-drawer-title" contenteditable="false"></h2>
              <button class="drawer-title-edit" id="list-drawer-title-edit" type="button" aria-label="Edit list name" aria-pressed="false">✎</button>
            </div>
            <p class="drawer-subtitle" id="list-drawer-subtitle"></p>
          </div>
          <button class="icon-button drawer-close" id="list-drawer-close" type="button" aria-label="Close list manager">×</button>
        </header>
        <div class="list-drawer-body" id="list-drawer-body"></div>
        <footer class="list-drawer-footer">
          <button class="primary" id="list-drawer-done" type="button">Done</button>
        </footer>
      </aside>
    </div>

    <div class="toast-stack" id="toast-stack" aria-live="polite" aria-label="Recent actions"></div>

    <input type="file" id="import-file" accept="application/json" hidden />

    <script src="feed.js"></script>
  </body>
</html>
